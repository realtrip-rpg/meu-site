<script>
// Removido SECTION_CONFIG pois não estava sendo usado

async function generateDiagnostic() {
  const google = document.getElementById('google').value.trim();
  const site = document.getElementById('site').value.trim();
  const instagram = document.getElementById('instagram').value.trim();
  const errorBox = document.getElementById('errorBox');

  if (!google && !site && !instagram) {
    errorBox.style.display = 'block';
    return;
  }

  errorBox.style.display = 'none';

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = "Gerando Prompt...";

  // Mostra loading
  document.getElementById('loading').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.querySelector('.form-card').style.display = 'none';

  // Animação dos passos
  const steps = ['step1','step2','step3','step4'];
  for (let i = 0; i < steps.length; i++) {
    await new Promise(r => setTimeout(r, 700));
    document.getElementById(steps[i]).classList.add('visible');
  }

  // === CRIA O PROMPT (versão limpa e mantida) ===
  const prompt = `Atue como especialista em crescimento de imobiliárias (aquisição, vendas e posicionamento digital).
Analise as seguintes fontes da imobiliária e gere um diagnóstico comercial direto e acionável:

Google Meu Negócio: ${google || 'Não informado'}
Site: ${site || 'Não informado'}
Instagram: ${instagram || 'Não informado'}

REGRAS IMPORTANTES:
- Seja extremamente direto e objetivo
- Foque em vendas, captação e conversão
- Evite respostas genéricas
- Use linguagem de consultor experiente

Responda **APENAS** com um JSON válido, sem nenhum texto antes ou depois:
{
  "fraseImpacto": "Uma frase poderosa de no máximo 1 linha resumindo o principal problema/oportunidade",
  "resumo": "Resumo do posicionamento percebido, público-alvo e tipo de imóvel (máx 4 linhas)",
  "gargalos": "• ponto 1\n• ponto 2\n• ponto 3 (máx 5)",
  "perdas": "• onde estão perdendo dinheiro hoje (seja bem específico)",
  "quickwins": "• ação rápida 1\n• ação rápida 2 (máx 5)",
  "alavancas": "• estratégia de escala 1\n• estratégia de escala 2 (máx 3)",
  "insights": "DORES LATENTES:\n• ...\n\nPROBLEMAS INVISÍVEIS:\n• ...\n\nGANCHOS DE ABORDAGEM:\n• ..."
}`;

  // Mostra o resultado
  document.getElementById('loading').style.display = 'none';
  document.getElementById('result').style.display = 'block';
  document.getElementById('timestamp').textContent =
    new Date().toLocaleString('pt-BR', { dateStyle: 'short', timeStyle: 'short' });

  document.getElementById('impactPhrase').innerHTML =
    `<strong>Prompt gerado com sucesso!</strong><br>Copie e cole no Claude, GPT-4o ou Gemini.`;

  // Renderiza o prompt com botão corrigido
  document.getElementById('sections').innerHTML = `
    <div class="section">
      <div class="section-head">
        <div class="section-num">📋</div>
        <div class="section-title accent">Seu Prompt Pronto</div>
      </div>
      <div class="section-body" style="padding:0;">
        <textarea id="promptOutput" style="width:100%; min-height:320px; background:#0d0d0d; color:#e8e8e0; border:1px solid #222; padding:16px; border-radius:8px; font-family: monospace; font-size: 0.9rem; line-height:1.5; resize:vertical;">${prompt}</textarea>
       
        <button id="copyBtn" style="margin:16px auto; display:block; padding:14px 28px; background:#c8f060; color:#0d0d0d; border:none; border-radius:8px; font-weight:700; font-size:0.95rem; cursor:pointer;">
          📋 Copiar Prompt para o Clipboard
        </button>
      </div>
    </div>
  `;

  // Adiciona o evento de clique no botão (melhor prática)
  document.getElementById('copyBtn').addEventListener('click', copiarPrompt);

  btn.disabled = false;
  btn.textContent = "Gerar Diagnóstico";
}

// Função de copiar corrigida e melhorada
function copiarPrompt() {
  const textarea = document.getElementById("promptOutput");
  const btn = document.getElementById("copyBtn");

  if (!textarea || !btn) return;

  textarea.select();
  navigator.clipboard.writeText(textarea.value)
    .then(() => {
      const originalText = btn.textContent;
      const originalBg = btn.style.background;

      btn.textContent = "✅ Copiado com sucesso!";
      btn.style.background = "#22c55e";

      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = originalBg;
      }, 2200);
    })
    .catch(() => {
      alert("Não foi possível copiar automaticamente.\nSelecione o texto manualmente e use Ctrl+C.");
    });
}

function resetForm() {
  document.getElementById('result').style.display = 'none';
  document.querySelector('.form-card').style.display = 'block';

  document.getElementById('google').value = '';
  document.getElementById('site').value = '';
  document.getElementById('instagram').value = '';

  ['step1','step2','step3','step4'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.classList.remove('visible');
  });
}
</script>
